<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiosco de Fichaje | Smitel</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary-color: #714B67; /* Color corporativo estilo Odoo */
            --secondary-color: #017e84;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #2d3748;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .quiosco-card { 
            width: 100%;
            max-width: 340px; 
            background: var(--card-bg); 
            padding: 35px 25px; 
            border-radius: 20px; 
            box-shadow: 0 12px 30px rgba(0,0,0,0.06); 
            text-align: center;
            box-sizing: border-box;
            margin: 15px;
        }

        .logo-container {
            margin-bottom: 25px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container img {
            max-width: 160px;
            max-height: 60px;
            object-fit: contain;
        }

        h2 { 
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 6px 0;
            color: #1a202c;
        }

        p.subtitle {
            font-size: 14px;
            color: #718096;
            margin: 0 0 30px 0;
        }

        input[type="password"] { 
            width: 100%; 
            padding: 15px; 
            font-size: 24px; 
            text-align: center; 
            border-radius: 10px; 
            border: 2px solid #e2e8f0; 
            box-sizing: border-box;
            margin-bottom: 12px;
            letter-spacing: 6px;
            transition: border-color 0.2s;
        }

        input[type="password"]:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .btn { 
            color: #ffffff; 
            border: none; 
            padding: 16px; 
            font-size: 16px; 
            font-weight: 600;
            border-radius: 10px; 
            cursor: pointer; 
            width: 100%; 
            box-sizing: border-box;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn-primary { background-color: var(--primary-color); }
        .btn-primary:active { background-color: #5a3c52; }

        .btn-secondary { background-color: var(--secondary-color); }
        .btn-secondary:active { background-color: #016266; }

        .divider-container {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #a0aec0;
            font-size: 12px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background-color: #e2e8f0;
        }

        .divider-text {
            padding: 0 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #reader { 
            width: 100%; 
            border-radius: 12px;
            overflow: hidden;
            margin-top: 15px; 
        }

        .status-box { 
            margin-top: 20px; 
            padding: 14px;
            border-radius: 10px;
            font-weight: 600; 
            font-size: 14px; 
            display: none;
        }
    </style>
</head>
<body>

<div class="quiosco-card">
    <div class="logo-container">
        <img src="logo.png" alt="Logo" onerror="this.style.display='none';">
    </div>

    <h2>Control de Asistencia</h2>
    <p class="subtitle">Smitel Terminal</p>
    
    <input type="password" id="pinInput" placeholder="••••" maxlength="6" pattern="\d*"/>
    <button class="btn btn-primary" onclick="ficharConPin()">FICHAR CON PIN</button>
    
    <div class="divider-container">
        <div class="divider-line"></div>
        <div class="divider-text">o</div>
        <div class="divider-line"></div>
    </div>
    
    <button class="btn btn-secondary" onclick="encenderCamara()">ESCANEAR CÓDIGO</button>
    <div id="reader"></div>

    <div id="statusBox" class="status-box"></div>
</div>

<script>
// La IP local de tu servidor Odoo
const ODOO_URL = "http://192.168.0.245:8069/jsonrpc"; 

function mostrarEstado(mensaje, tipo) {
    const statusBox = document.getElementById("statusBox");
    statusBox.style.display = "block";
    statusBox.innerText = mensaje;
    
    if (tipo === 'loading') {
        statusBox.style.color = "#8a6d3b";
        statusBox.style.backgroundColor = "#fcf8e3";
    } else if (tipo === 'success') {
        statusBox.style.color = "#2f855a";
        statusBox.style.backgroundColor = "#f0fff4";
        setTimeout(() => { statusBox.style.display = "none"; }, 4000);
    } else {
        statusBox.style.color = "#9b2c2c";
        statusBox.style.backgroundColor = "#fff5f5";
    }
}

function enviarFichajeAOdoo(codigoIdentificador) {
    mostrarEstado("Comunicando con Odoo...", "loading");

    const payload = {
        jsonrpc: "2.0",
        method: "call",
        params: {
            service: "object",
            method: "execute_kw",
            args: [
                "Smitel_Odoo",  // <-- 1. Pon el nombre de tu BD de Odoo
                2,                   // <-- 2. ID de usuario administrador
                "1234",     // <-- 3. Contraseña de acceso
                "hr.employee",       
                "attendance_scan",   
                [codigoIdentificador]
            ]
        },
        id: Math.floor(Math.random() * 100)
    };

    fetch(ODOO_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    })
    .then(response => response.json())
    .then(data => {
        if (data.result) {
            mostrarEstado("¡Fichaje registrado con éxito!", "success");
        } else {
            mostrarEstado("Error: Identificador no válido.", "error");
        }
        document.getElementById("pinInput").value = "";
    })
    .catch(err => {
        mostrarEstado("Error de red: Servidor Odoo inaccesible.", "error");
        console.error(err);
    });
}

function ficharConPin() {
    const pin = document.getElementById("pinInput").value;
    if(pin.length > 0) {
        enviarFichajeAOdoo(pin);
    }
}

function encenderCamara() {
    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 220 });
    html5QrcodeScanner.render((decodedText) => {
        html5QrcodeScanner.clear();
        enviarFichajeAOdoo(decodedText);
    });
}
</script>

</body>
</html>
