name: Compilar Quiosco iOS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v4.2.2

    - name: Instalar Node.js
      uses: actions/setup-node@v4.2.0
      with:
        node-version: 22

    - name: Instalar Cordova
      run: npm install -g cordova

    - name: Crear Proyecto Cordova
      run: |
        cordova create app com.smitel.quiosco QuioscoSmitel
        cd app
        cordova platform add ios
        
        # Mover tu HTML y Logo de pantalla a la carpeta de la app
        rm www/index.html
        cp ../index.html www/
        cp ../logo.png www/ 2>/dev/null || :
        
        # Copiar el icono de la máquina de fichar a la raíz de la app
        cp ../icon.png . 2>/dev/null || :
        
        # Instalar plugin de la camara
        cordova plugin add cordova-plugin-camera
        
        # Configurar de forma limpia el icono en config.xml
        sed -i '' 's|<platform name="ios">|<platform name="ios">\n    <icon src="icon.png" />|g' config.xml
        
        cordova prepare ios

    - name: Desactivar MacCatalyst en el Manifiesto de Paquetes y Xcode
      run: |
        cd app/platforms/ios
        
        # CIRUGÍA DIRECTA: Eliminamos la plataforma macCatalyst de cualquier manifiesto de Swift Package
        # para que el validador previo de Xcode no encuentre ninguna regla rota al bajar a iOS 12.
        find . -name "Package.swift" -exec sed -i '' '/macCatalyst/d' {} +
        find . -name "Package.swift" -exec sed -i '' '/.macCatalyst/d' {} +
        
        # Modificar también el proyecto Xcode nativo eliminando el soporte híbrido por si acaso
        find . -name "project.pbxproj" -exec sed -i '' '/SUPPORTS_MACCATALYST/d' {} +

    - name: Compilación Nativa (Evitando Validación de Catalyst)
      run: |
        cd app/platforms/ios
        
        # Lanzamos xcodebuild apuntando al simulador (para evitar firmas estrictas)
        # pero forzando el despliegue compatible con iOS 12 para tu iPhone 5s
        xcodebuild -workspace App.xcworkspace \
          -scheme App \
          -configuration Debug \
          -sdk iphonesimulator \
          -destination "generic/platform=iOS Simulator" \
          IPHONEOS_DEPLOYMENT_TARGET=12.0 \
          ARCHS="arm64" \
          ONLY_ACTIVE_ARCH=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          clean build

    - name: Construir archivo .IPA oficial para Sideloadly
      run: |
        echo "Localizando el ejecutable real..."
        APP_PATH=$(find ~ -name "QuioscoSmitel.app" -type d 2>/dev/null | grep -v "BuildProductsPath" | head -n 1)
        if [ -z "$APP_PATH" ]; then
          APP_PATH=$(find ~ -name "App.app" -type d 2>/dev/null | grep -v "BuildProductsPath" | head -n 1)
        fi
        
        if [ -z "$APP_PATH" ]; then
          echo "Error crítico: No se encontró ningún binario ejecutable."
          exit 1
        fi
        
        echo "¡App localizada con éxito en! -> $APP_PATH"
        
        mkdir -p ipa_structure/Payload
        cp -R "$APP_PATH" ipa_structure/Payload/
        
        mv ipa_structure/Payload/*.app ipa_structure/Payload/QuioscoSmitel.app 2>/dev/null || :
        
        # Fijar los metadatos de ejecución en iOS 12.0 para evitar cierres inesperados
        plutil -replace MinimumOSVersion -string "12.0" ipa_structure/Payload/QuioscoSmitel.app/Info.plist
        
        cd ipa_structure
        zip -r ../QuioscoSmitel.ipa Payload
        cd ..

    - name: Guardar el archivo ejecutable resultante (.ipa)
      uses: actions/upload-artifact@v4
      with:
        name: App-Quiosco-Smitel-IPA
        path: QuioscoSmitel.ipa
