name: Compilar Quiosco iOS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v4.2.2

    - name: Instalar Node.js
      uses: actions/setup-node@v4.2.0
      with:
        node-version: 22

    - name: Instalar Cordova
      run: npm install -g cordova

    - name: Crear Proyecto Cordova
      run: |
        cordova create app com.smitel.quiosco QuioscoSmitel
        cd app
        cordova platform add ios
        
        # Mover tu HTML y Logo a la carpeta de la app
        rm www/index.html
        cp ../index.html www/
        cp ../logo.png www/
        
        # Instalar plugin de la camara
        cordova plugin add cordova-plugin-camera

    - name: Preparar archivos para Xcode
      run: |
        cd app
        cordova prepare ios

    - name: Compilar App (Autodetectar proyecto)
      run: |
        cd app/platforms/ios
        # Buscamos el espacio de trabajo generado dinámicamente
        WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
        SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list | grep "Schemes:" -A 1 | tail -n 1 | xargs)
        
        echo "Compilando Workspace: $WORKSPACE con el Scheme: $SCHEME"
        
        xcodebuild -workspace "$WORKSPACE" \
          -scheme "$SCHEME" \
          -configuration Debug \
          -sdk iphonesimulator \
          -destination 'generic/platform=iOS Simulator' \
          CODE_SIGNING_ALLOWED=NO \
          CONFIGURATION_BUILD_DIR=build/output

    - name: Guardar el archivo ejecutable resultante
      uses: actions/upload-artifact@v4
      with:
        name: App-Quiosco-Smitel
        path: app/platforms/ios/build/output/*.app
