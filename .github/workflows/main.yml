name: Compilar Quiosco iOS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v4.2.2

    - name: Instalar Node.js
      uses: actions/setup-node@v4.2.0
      with:
        node-version: 18

    - name: Instalar Cordova
      run: npm install -g cordova@11.1.0

    - name: Crear Proyecto Cordova Estable
      run: |
        cordova create app com.smitel.quiosco QuioscoSmitel
        cd app
        cordova platform add ios@6.3.0
        
        # Mover archivos corporativos
        rm www/index.html
        cp ../index.html www/
        cp ../logo.png www/ 2>/dev/null || :
        cp ../icon.png . 2>/dev/null || :
        
        # Instalar plugins críticos para la cámara y los permisos
        cordova plugin add cordova-plugin-camera
        
        # Modificar config.xml para saltarse las restricciones de red y de cámara de Apple
        # 1. Añadimos el Target y el Icono
        sed -i '' 's|<platform name="ios">|<platform name="ios">\n    <preference name="DeploymentTarget" value="12.0" />\n    <icon src="icon.png" />|g' config.xml
        
        # 2. TRUCO DE CÁMARA Y RED: Permitir acceso absoluto al origen externo y forzar esquema HTTPS local
        sed -i '' 's|</platform>|    <preference name="Scheme" value="app" />\n    <preference name="Hostname" value="localhost" />\n    <allow-navigation href="*" />\n    <allow-intent href="*" />\n    <access origin="*" />\n</platform>|g' config.xml
        
        # 3. Desactivar el bloqueo ATS de iOS para permitir conectar a IPs locales http://
        sed -i '' 's|</widget>|  <edit-config file="*-Info.plist" mode="merge" target="NSAppTransportSecurity">\n    <dict>\n      <key>NSAllowsArbitraryLoads</key>\n      <true/>\n    </dict>\n  </edit-config>\n</widget>|g' config.xml
        
        cordova prepare ios

    - name: Compilación NATIVA para Hardware Real (arm64 Físico)
      run: |
        cd app/platforms/ios
        
        # Compilamos para iphoneos (Dispositivo Físico Real) usando la estructura limpia clásica
        xcodebuild -workspace QuioscoSmitel.xcworkspace \
          -scheme QuioscoSmitel \
          -configuration Debug \
          -sdk iphoneos \
          -destination "generic/platform=iOS" \
          IPHONEOS_DEPLOYMENT_TARGET=12.0 \
          ARCHS="arm64" \
          ONLY_ACTIVE_ARCH=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          clean build

    - name: Construir archivo .IPA oficial para Sideloadly
      run: |
        echo "Localizando el ejecutable móvil real..."
        APP_PATH=$(find ~ -name "QuioscoSmitel.app" -type d 2>/dev/null | grep -v "BuildProductsPath" | head -n 1)
        
        if [ -z "$APP_PATH" ]; then
          echo "Error crítico: No se encontró ningún binario ejecutable."
          exit 1
        fi
        
        mkdir -p ipa_structure/Payload
        cp -R "$APP_PATH" ipa_structure/Payload/
        
        plutil -replace MinimumOSVersion -string "12.0" ipa_structure/Payload/QuioscoSmitel.app/Info.plist
        
        cd ipa_structure
        zip -r ../QuioscoSmitel.ipa Payload
        cd ..

    - name: Guardar el archivo ejecutable resultante (.ipa)
      uses: actions/upload-artifact@v4
      with:
        name: App-Quiosco-Smitel-IPA
        path: QuioscoSmitel.ipa
