name: Compilar Quiosco iOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Cordova
        run: |
          npm install -g cordova@12

      - name: Crear proyecto Cordova
        run: |

          cordova create app com.smitel.quiosco QuioscoSmitel

          cd app

          cordova platform add ios@7.1.1

          cordova plugin add cordova-plugin-camera@7

          rm www/index.html

          cp ../index.html www/

          if [ -f ../logo.png ]; then
            cp ../logo.png www/
          fi

          if [ -f ../icon.png ]; then
            cp ../icon.png .
          fi

          sed -i '' '/<platform name="ios">/a\
              <preference name="deployment-target" value="12.0"/>
          ' config.xml

          cordova prepare ios

      - name: Desactivar Mac Catalyst
        run: |

          cd app/platforms/ios

          grep -R "MACCATALYST" . || true

          sed -i '' \
          's/SUPPORTS_MACCATALYST = YES;/SUPPORTS_MACCATALYST = NO;/g' \
          App.xcodeproj/project.pbxproj || true

          sed -i '' \
          's/ENABLE_MACCATALYST = YES;/ENABLE_MACCATALYST = NO;/g' \
          App.xcodeproj/project.pbxproj || true

     - name: Mostrar estructura del proyecto iOS
  run: |
    cd app/platforms/ios
    pwd
    ls -la
    find . -maxdepth 2

      - name: Compilar
        run: |

          cd app/platforms/ios

          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            IPHONEOS_DEPLOYMENT_TARGET=12.0 \
            build

      - name: Buscar .app
        run: |

          APP=$(find app/platforms/ios -name "*.app" | head -n 1)

          echo "APP=$APP"

          mkdir Payload

          cp -R "$APP" Payload/

          zip -qry QuioscoSmitel.ipa Payload

      - name: Subir IPA
        uses: actions/upload-artifact@v4
        with:
          name: QuioscoSmitel
          path: QuioscoSmitel.ipa
