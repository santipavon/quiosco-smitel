      - name: Compilar
        run: |
          cd app/platforms/ios

          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -1)
          PROJECT=$(find . -maxdepth 1 -name "*.xcodeproj" | head -1)

          mkdir -p build_output

          if [ -n "$WORKSPACE" ]; then

            SCHEME=$(basename "$WORKSPACE" .xcworkspace)

            echo "Compilando workspace $WORKSPACE"
            echo "Scheme $SCHEME"

            xcodebuild \
              -workspace "$WORKSPACE" \
              -scheme "$SCHEME" \
              -sdk iphoneos \
              -configuration Release \
              -derivedDataPath build_output \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              IPHONEOS_DEPLOYMENT_TARGET=12.0 \
              build

          else

            SCHEME=$(basename "$PROJECT" .xcodeproj)

            echo "Compilando proyecto $PROJECT"
            echo "Scheme $SCHEME"

            xcodebuild \
              -project "$PROJECT" \
              -scheme "$SCHEME" \
              -sdk iphoneos \
              -configuration Release \
              -derivedDataPath build_output \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              IPHONEOS_DEPLOYMENT_TARGET=12.0 \
              build

          fi


      - name: Buscar aplicación compilada
        run: |

          echo "Buscando aplicaciones generadas..."

          find app/platforms/ios -name "*.app"

          APP=$(find app/platforms/ios -name "*.app" | head -1)

          if [ -z "$APP" ]; then
            echo "No encontrada en platforms/ios, buscando en build_output"

            APP=$(find app/platforms/ios/build_output -name "*.app" | head -1)
          fi

          if [ -z "$APP" ]; then
            echo "No se encontró ninguna aplicación .app"
            exit 1
          fi

          echo "Aplicación encontrada:"
          echo "$APP"

          mkdir -p Payload
          cp -R "$APP" Payload/

          zip -qry QuioscoSmitel.ipa Payload
