name: Compilar Quiosco iOS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v4.2.2

    - name: Instalar Node.js
      uses: actions/setup-node@v4.2.0
      with:
        node-version: 18

    - name: Instalar Cordova
      run: npm install -g cordova@11.1.0

    - name: Crear Proyecto Cordova Quiosco Directo
      run: |
        cordova create app com.smitel.quiosco QuioscoSmitel
        cd app
        cordova platform add ios@6.3.0
        
        # Copiar icono corporativo
        cp ../icon.png . 2>/dev/null || :
        
        # Instalar el plugin de la cámara para que iOS registre los permisos de hardware
        cordova plugin add cordova-plugin-camera
        
        # Configurar el config.xml para que apunte DIRECTO a tu Odoo en vez de usar el index.html local
        # REEMPLAZA 'http://TU_IP_DE_ODOO:8069' POR LA IP REAL DE TU SERVIDOR ODOO
        sed -i '' 's|<content src="index.html" />|<content src="http://192.168.0.245:8069" />|g' config.xml
        
        # Inyectar permisos de Cámara en el Info.plist de iOS para que no se cierre al pedir acceso
        sed -i '' 's|<platform name="ios">|<platform name="ios">\n    <preference name="DeploymentTarget" value="12.0" />\n    <icon src="icon.png" />\n    <config-file platform="ios" target="*-Info.plist" parent="NSCameraUsageDescription">\n        <string>Necesitamos la camara para escanear los codigos de fichaje del quiosco.</string>\n    </config-file>|g' config.xml
        
        # Abrir el cortafuegos de Apple (ATS) para permitir llamadas HTTP a tu red local
        sed -i '' 's|</platform>|    <allow-navigation href="*" />\n    <allow-intent href="*" />\n    <access origin="*" />\n</platform>|g' config.xml
        sed -i '' 's|</widget>|  <edit-config file="*-Info.plist" mode="merge" target="NSAppTransportSecurity">\n    <dict>\n      <key>NSAllowsArbitraryLoads</key>\n      <true/>\n    </dict>\n  </edit-config>\n</widget>|g' config.xml
        
        cordova prepare ios

    - name: Compilación Hardware Real
      run: |
        cd app/platforms/ios
        xcodebuild -workspace QuioscoSmitel.xcworkspace \
          -scheme QuioscoSmitel \
          -configuration Debug \
          -sdk iphoneos \
          -destination "generic/platform=iOS" \
          IPHONEOS_DEPLOYMENT_TARGET=12.0 \
          ARCHS="arm64" \
          ONLY_ACTIVE_ARCH=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          clean build

    - name: Construir archivo .IPA oficial para Sideloadly
      run: |
        echo "Localizando ejecutable..."
        APP_PATH=$(find ~ -name "QuioscoSmitel.app" -type d 2>/dev/null | grep -v "BuildProductsPath" | head -n 1)
        mkdir -p ipa_structure/Payload
        cp -R "$APP_PATH" ipa_structure/Payload/
        plutil -replace MinimumOSVersion -string "12.0" ipa_structure/Payload/QuioscoSmitel.app/Info.plist
        cd ipa_structure
        zip -r ../QuioscoSmitel.ipa Payload
        cd ..

    - name: Guardar el archivo ejecutable resultante (.ipa)
      uses: actions/upload-artifact@v4
      with:
        name: App-Quiosco-Smitel-IPA
        path: QuioscoSmitel.ipa
