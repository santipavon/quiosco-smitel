name: Compilar Quiosco iOS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v4.2.2

    - name: Instalar Node.js
      uses: actions/setup-node@v4.2.0
      with:
        node-version: 22

    - name: Instalar Cordova
      run: npm install -g cordova

    - name: Crear Proyecto Cordova
      run: |
        cordova create app com.smitel.quiosco QuioscoSmitel
        cd app
        cordova platform add ios
        
        # Mover tu HTML y Logo de pantalla a la carpeta de la app
        rm www/index.html
        cp ../index.html www/
        cp ../logo.png www/ 2>/dev/null || :
        
        # Copiar el icono de la máquina de fichar a la raíz de la app
        cp ../icon.png . 2>/dev/null || :
        
        # Instalar plugin de la camara
        cordova plugin add cordova-plugin-camera
        
        # Inyectar la configuración básica del icono de forma limpia
        sed -i '' 's|<platform name="ios">|<platform name="ios">\n    <icon src="icon.png" />|g' config.xml
        
        # Preparar los archivos nativos
        cordova prepare ios

    - name: Compilación Forzada (Evitando restricciones de Apple)
      run: |
        cd app/platforms/ios
        # Usamos el compilador directo para el simulador genérico (ignora firmas, catalyst y certificados)
        xcodebuild -workspace App.xcworkspace \
          -scheme App \
          -configuration Debug \
          -sdk iphonesimulator \
          -destination 'generic/platform=iOS Simulator' \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          clean build

    - name: Construir archivo .IPA oficial para Sideloadly
      run: |
        echo "Localizando el ejecutable limpio..."
        # Buscamos la carpeta de la app generada en el entorno de simulación
        APP_PATH=$(find ~ -name "App.app" -type d 2>/dev/null | head -n 1)
        
        if [ -z "$APP_PATH" ]; then
          # Si Cordova le puso el nombre largo del proyecto, lo buscamos así
          APP_PATH=$(find ~ -name "QuioscoSmitel.app" -type d 2>/dev/null | head -n 1)
        fi
        
        if [ -z "$APP_PATH" ]; then
          echo "Error crítico: No se encontró ningún binario ejecutable."
          exit 1
        fi
        
        echo "¡App localizada con éxito en! -> $APP_PATH"
        
        # Crear la estructura oficial que Sideloadly y tu iPhone 5s sí aceptan
        mkdir -p ipa_structure/Payload
        cp -R "$APP_PATH" ipa_structure/Payload/
        
        # Cambiar el nombre interno de la carpeta de la app para que Sideloadly la asocie bien
        mv ipa_structure/Payload/*.app ipa_structure/Payload/QuioscoSmitel.app 2>/dev/null || :
        
        # Modificar al vuelo la Info.plist interna para asegurar que Sideloadly la fuerce en tu iOS 12
        plutil -replace MinimumOSVersion -string "12.0" ipa_structure/Payload/QuioscoSmitel.app/Info.plist
        
        # Comprimir en formato IPA legítimo
        cd ipa_structure
        zip -r ../QuioscoSmitel.ipa Payload
        cd ..
        echo "¡Archivo .ipa universal generado!"

    - name: Guardar el archivo ejecutable resultante (.ipa)
      uses: actions/upload-artifact@v4
      with:
        name: App-Quiosco-Smitel-IPA
        path: QuioscoSmitel.ipa
