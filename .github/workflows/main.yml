name: Compilar Quiosco iOS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v4.2.2

    - name: Instalar Node.js
      uses: actions/setup-node@v4.2.0
      with:
        node-version: 22

    - name: Instalar Cordova
      run: npm install -g cordova

    - name: Crear Proyecto Cordova
      run: |
        cordova create app com.smitel.quiosco QuioscoSmitel
        cd app
        cordova platform add ios
        
        # Mover tu HTML y Logo a la carpeta de la app
        rm www/index.html
        cp ../index.html www/
        cp ../logo.png www/
        
        # Instalar plugin de la camara
        cordova plugin add cordova-plugin-camera

    - name: Compilar App Real con Cordova
      run: |
        cd app
        cordova build ios --emulator

    - name: Construir archivo .IPA oficial para Sideloadly
      run: |
        echo "Localizando la App y construyendo la estructura oficial..."
        # Localizamos dónde ha dejado Xcode la app compilada
        APP_PATH=$(find . -name "QuioscoSmitel.app" -type d -head -n 1)
        
        if [ -z "$APP_PATH" ]; then
          echo "Error: No se encontró el compilado .app"
          exit 1
        fi
        
        # Creamos la estructura requerida por Apple: Payload/
        mkdir -p ipa_structure/Payload
        cp -R "$APP_PATH" ipa_structure/Payload/
        
        # Comprimimos la carpeta en un .ipa real legítimo
        cd ipa_structure
        zip -r ../QuioscoSmitel.ipa Payload
        cd ..
        
        echo "¡Archivo .ipa creado con éxito!"

    - name: Guardar el archivo ejecutable resultante (.ipa)
      uses: actions/upload-artifact@v4
      with:
        name: App-Quiosco-Smitel-IPA
        path: QuioscoSmitel.ipa
