name: Compilar Quiosco iOS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v4.2.2

    - name: Instalar Node.js
      uses: actions/setup-node@v4.2.0
      with:
        node-version: 22

    - name: Instalar Cordova
      run: npm install -g cordova

    - name: Crear Proyecto Cordova
      run: |
        cordova create app com.smitel.quiosco QuioscoSmitel
        cd app
        cordova platform add ios
        
        # Mover tu HTML y Logo a la carpeta de la app
        rm www/index.html
        cp ../index.html www/
        cp ../logo.png www/
        
        # Instalar plugin de la camara
        cordova plugin add cordova-plugin-camera

    - name: Compilar App Real con Cordova
      run: |
        cd app
        cordova build ios --emulator

    - name: Localizar y rescatar la App compilada
      run: |
        echo "Buscando la aplicación compilada en el sistema..."
        # Busca cualquier carpeta .app generada y la mueve a la raíz para asegurar su captura
        find . -name "QuioscoSmitel.app" -type d -exec cp -R {} ./QuioscoSmitel.app \;
        echo "Contenido de la raíz del proyecto tras rescate:"
        ls -d *.app || echo "No se encontró el archivo compilado en ninguna ruta estándar."

    - name: Guardar el archivo ejecutable resultante
      uses: actions/upload-artifact@v4
      with:
        name: App-Quiosco-Smitel
        path: QuioscoSmitel.app
