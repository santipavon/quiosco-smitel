name: Compilar Quiosco iOS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v4.2.2

    - name: Instalar Node.js
      uses: actions/setup-node@v4.2.0
      with:
        node-version: 22

    - name: Instalar Cordova
      run: npm install -g cordova

    - name: Crear Proyecto Cordova
      run: |
        cordova create app com.smitel.quiosco QuioscoSmitel
        cd app
        cordova platform add ios
        
        # Mover tu HTML y Logo de pantalla a la carpeta de la app
        rm www/index.html
        cp ../index.html www/
        cp ../logo.png www/ 2>/dev/null || :
        
        # Copiar el icono de la máquina de fichar a la raíz de la app
        cp ../icon.png . 2>/dev/null || :
        
        # Instalar plugin de la camara
        cordova plugin add cordova-plugin-camera
        
        # Configurar la versión de iOS destino en config.xml
        sed -i '' 's|<platform name="ios">|<platform name="ios">\n    <icon src="icon.png" />|g' config.xml
        
        cordova prepare ios

    - name: Eliminar Soporte de Escenas Modernas (Fix para iOS 12)
      run: |
        cd app/platforms/ios
        
        # 1. Borramos físicamente el archivo conflictivo de iOS 13+
        rm -f App/SceneDelegate.swift
        
        # 2. Quitamos la referencia de SceneDelegate en el archivo de configuración del proyecto Xcode
        find . -name "project.pbxproj" -exec sed -i '' '/SceneDelegate.swift/d' {} +
        
        # 3. Limpiamos las referencias del manifiesto Info.plist que obligan a usar escenas
        if [ -f "App/QuioscoSmitel-Info.plist" ]; then
          plutil -remove UIApplicationSceneManifest App/QuioscoSmitel-Info.plist 2>/dev/null || :
        fi
        if [ -f "App/Info.plist" ]; then
          plutil -remove UIApplicationSceneManifest App/Info.plist 2>/dev/null || :
        fi

    - name: Compilación Definitiva (Simulador + Target iOS 12)
      run: |
        cd app/platforms/ios
        
        xcodebuild -workspace App.xcworkspace \
          -scheme App \
          -configuration Debug \
          -sdk iphonesimulator \
          -destination "generic/platform=iOS Simulator" \
          IPHONEOS_DEPLOYMENT_TARGET=12.0 \
          ARCHS="arm64" \
          ONLY_ACTIVE_ARCH=NO \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          clean build

    - name: Construir archivo .IPA oficial para Sideloadly
      run: |
        echo "Localizando el ejecutable real..."
        APP_PATH=$(find ~ -name "QuioscoSmitel.app" -type d 2>/dev/null | grep -v "BuildProductsPath" | head -n 1)
        if [ -z "$APP_PATH" ]; then
          APP_PATH=$(find ~ -name "App.app" -type d 2>/dev/null | grep -v "BuildProductsPath" | head -n 1)
        fi
        
        if [ -z "$APP_PATH" ]; then
          echo "Error crítico: No se encontró ningún binario ejecutable."
          exit 1
        fi
        
        mkdir -p ipa_structure/Payload
        cp -R "$APP_PATH" ipa_structure/Payload/
        
        mv ipa_structure/Payload/*.app ipa_structure/Payload/QuioscoSmitel.app 2>/dev/null || :
        
        # Forzar compatibilidad nativa final en el metadato definitivo
        plutil -replace MinimumOSVersion -string "12.0" ipa_structure/Payload/QuioscoSmitel.app/Info.plist
        
        cd ipa_structure
        zip -r ../QuioscoSmitel.ipa Payload
        cd ..

    - name: Guardar el archivo ejecutable resultante (.ipa)
      uses: actions/upload-artifact@v4
      with:
        name: App-Quiosco-Smitel-IPA
        path: QuioscoSmitel.ipa
